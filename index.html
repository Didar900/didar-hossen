<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didar Hossen | Oracle APEX Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="glass-nav">
        <div class="logo">LEARN WITH DIDAR</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Oracle APEX <span class="highlight">Full-Stack</span> Developer</h1>
            <p>Specializing in enterprise systems, PL/SQL architecture, and modern UI/UX design.</p>
            <div class="cta-buttons">
                <a href="#projects" class="btn-primary">View My Work</a>
                <a href="#contact" class="btn-secondary">Let's Talk</a>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <div class="glass-card">
            <h2>Get In Touch</h2>
            <form id="contactForm">
                <div class="input-group">
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <textarea id="message" rows="5" placeholder="Project Details" required></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
            <div id="formResponse"></div>
        </div>
    </section>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/db_handler.js"></script>
</body>
</html>
