<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle APEX Developer | Full Stack Portfolio</title>
    
    <!-- Bootstrap 5, Animate.css, FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* Custom Cursor Style */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #f80000;
        }
        .cursor-outline {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(248, 0, 0, 0.5);
        }
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        :root {
            --oracle-red: #f80000;
            --dark-surface: #121212;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #ffffff;
            overflow-x: hidden;
            cursor: none; /* Hide default cursor */
        }

        /* Logo Styling */
        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--oracle-red);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 8px;
            margin-right: 10px;
            box-shadow: 0 0 15px rgba(248, 0, 0, 0.4);
        }

        /* Hero Section */
        .hero-section {
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .oracle-border {
            border-left: 5px solid var(--oracle-red);
            padding-left: 20px;
        }

        .transaction-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .transaction-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--oracle-red);
            box-shadow: 0 10px 30px rgba(248, 0, 0, 0.2);
        }

        .navbar {
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-oracle {
            background-color: var(--oracle-red);
            color: white;
            padding: 12px 30px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        .btn-oracle:hover {
            background-color: white;
            color: var(--oracle-red);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <!-- Custom Cursor Elements -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <div class="brand-logo">O</div>
                <span>APEX_DEV</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-oracle ms-lg-3" href="mailto:your@email.com">Hire Me</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container">
            <div class="animate__animated animate__zoomIn">
                <h6 class="text-uppercase tracking-widest text-danger mb-3">Full Stack Oracle Specialist</h6>
                <h1 class="display-1 fw-bold mb-4">Code. Database. <br><span class="oracle-border text-white">Scale.</span></h1>
                <p class="lead text-secondary mb-5 mx-auto" style="max-width: 600px;">
                    আমি তৈরি করি হাই-পারফরম্যান্স ডাটাবেস চালিত ওয়েব অ্যাপ্লিকেশন। ওরাকল অ্যাপেক্স এবং মডার্ন ফ্রন্টএন্ড এর সমন্বয়ে আপনার ব্যবসার সমাধান দিতে আমি প্রস্তুত।
                </p>
                <div class="animate__animated animate__fadeInUp animate__delay-1s">
                    <a href="#projects" class="btn btn-oracle me-3">View Portfolio</a>
                    <a href="#skills" class="btn btn-outline-light px-4 py-2">Tech Stack</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Project Section (Partial Update) -->
    <section id="projects" class="py-5">
        <div class="container text-center mb-5">
            <h2 class="display-4 fw-bold">My <span class="text-danger">Works</span></h2>
            <hr class="bg-danger mx-auto" style="width: 100px; height: 3px;">
        </div>
        <!-- ... (Project Carousel remains similar but with new animations) -->
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Cursor Animation Logic
        const cursorDot = document.querySelector("[data-cursor-dot]");
        const cursorOutline = document.querySelector("[data-cursor-outline]");

        window.addEventListener("mousemove", function (e) {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            // Adding a slight lag effect to the outline
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Scale cursor on hover links
        const links = document.querySelectorAll('a, button, .transaction-card');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursorOutline.style.transform = 'translate(-50%, -50%) scale(2)';
                cursorOutline.style.backgroundColor = 'rgba(248, 0, 0, 0.1)';
            });
            link.addEventListener('mouseleave', () => {
                cursorOutline.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorOutline.style.backgroundColor = 'transparent';
            });
        });
    </script>
</body>
</html>
